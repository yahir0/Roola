<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024"
     viewBox="0 0 1024 1024">
  <!-- Roola アプリアイコン / シンボルマーク（ADR-0038 Polaris 準拠）。
       背景グラファイト #121317 の角丸スクエアに、オフホワイト #ECEFF2 の
       細いモノラインのシンボルを置く。中央円環（連続）＋外周円環（N/E/S/W
       に隙間を空けた 4 つの円弧）＋東西南北の細長い三角形矢印（基部は外周
       円環の内側、先端は外側）。詳細は branding/README.md、PNG 生成は
       generate_app_icon.py。 -->
  <rect x="100" y="100" width="824" height="824" rx="184" fill="#121317"/>
  <!-- 東西南北の矢印（基部は外周円環の内側、先端は外側）。各矢印は
       先端 / 基部の左右の角 / 基部中央（先端側へ凹ませる）の 4 点。 -->
  <g fill="#ECEFF2">
    <polygon points="512,190 568,352 512,320 456,352"/>
    <polygon points="834,512 672,456 704,512 672,568"/>
    <polygon points="512,834 568,672 512,704 456,672"/>
    <polygon points="190,512 352,456 320,512 352,568"/>
  </g>
  <g fill="none" stroke="#ECEFF2" stroke-width="20">
    <!-- 中央円環（連続） -->
    <circle cx="512" cy="512" r="108"/>
    <!-- 外周円環（N/E/S/W に隙間を空けた 4 つの円弧） -->
    <path d="M 701.1 577.1 A 200 200 0 0 1 577.1 701.1"/>
    <path d="M 446.9 701.1 A 200 200 0 0 1 322.9 577.1"/>
    <path d="M 322.9 446.9 A 200 200 0 0 1 446.9 322.9"/>
    <path d="M 577.1 322.9 A 200 200 0 0 1 701.1 446.9"/>
  </g>
</svg>
