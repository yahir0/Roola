schema: spec-driven

context: |
  Roola は OpenSpec を「change の design / proposal / spec / tasks を書く場所」
  として使うが、`openspec/specs/` への spec promote は運用していない。
  全 change の spec.md は `openspec/changes/<name>/specs/` または archive 後
  `openspec/changes/archive/<date>-<name>/specs/` 配下に残り続ける。

  そのため `openspec archive` は `--skip-specs` で実行する。`openspec/specs/`
  が空なのは仕様で、過去 change は archive ディレクトリを直接読めば全文残って
  いる（仕様の歴史は git log と archive で追える）。

  詳細経緯: docs/adr/ と CLAUDE.md「ディレクトリ構成」を参照。
