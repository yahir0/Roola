<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal</title>
<style>
  @font-face {
    font-family: 'SarasaTermJ';
    src: url('assets/fonts/SarasaTermJ-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
  @font-face {
    font-family: 'SarasaTermJ';
    src: url('assets/fonts/SarasaTermJ-Bold.ttf') format('truetype');
    font-weight: bold;
    font-style: normal;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #1a1a1a; overflow: hidden; }
  #terminal { width: 100%; height: 100%; }
</style>
<link rel="stylesheet" href="xterm.css">
</head>
<body>
<div id="terminal"></div>
<script src="xterm.js"></script>
<script src="xterm-addon-fit.js"></script>
<script>
  const term = new Terminal({
    fontFamily: "'SarasaTermJ', 'Courier New', monospace",
    fontSize: 13,
    lineHeight: 1.2,
    theme: {
      background: '#1a1a1a',
      foreground: '#d4d4d4',
      cursor: '#d4a017',
      cursorAccent: '#1a1a1a',
      black:   '#1a1a1a', red:     '#e06c75',
      green:   '#98c379', yellow:  '#e5c07b',
      blue:    '#61afef', magenta: '#c678dd',
      cyan:    '#56b6c2', white:   '#abb2bf',
      brightBlack:   '#5c6370', brightRed:     '#e06c75',
      brightGreen:   '#98c379', brightYellow:  '#e5c07b',
      brightBlue:    '#61afef', brightMagenta: '#c678dd',
      brightCyan:    '#56b6c2', brightWhite:   '#ffffff',
    },
    allowTransparency: false,
    cursorBlink: true,
    scrollback: 5000,
  });

  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  // PTY → xterm: Dart calls term_write(base64data)
  window.term_write = function(base64data) {
    const bytes = Uint8Array.from(atob(base64data), c => c.charCodeAt(0));
    term.write(bytes);
  };

  // xterm → PTY: send user input to Dart
  term.onData(function(data) {
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage(JSON.stringify({ type: 'input', data: data }));
    }
  });

  // Resize: called by Dart when the widget size changes
  window.term_resize = function(cols, rows) {
    term.resize(cols, rows);
  };

  // Auto-fit on window resize
  const ro = new ResizeObserver(function() {
    fitAddon.fit();
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage(
        JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows })
      );
    }
  });
  ro.observe(document.getElementById('terminal'));

  // Signal ready
  if (window.chrome && window.chrome.webview) {
    window.chrome.webview.postMessage(JSON.stringify({ type: 'ready' }));
  }
</script>
</body>
</html>
