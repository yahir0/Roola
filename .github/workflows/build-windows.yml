# Windows ビルド確認ワークフロー（ADR-0058）。
# PR / main push で flutter build windows がエラーなく通ることを確認する。

name: Build Windows

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read Flutter version from .fvmrc
        id: fvm
        shell: bash
        run: |
          VERSION=$(cat .fvmrc | python -c "import sys,json; print(json.load(sys.stdin)['flutter'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable
          cache: true

      - name: Enable Developer Mode (symlinks)
        shell: powershell
        run: |
          $regPath = 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock'
          if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
          Set-ItemProperty -Path $regPath -Name AllowDevelopmentWithoutDevLicense -Value 1

      - name: Get dependencies
        run: flutter pub get

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Build Windows (Release)
        run: flutter build windows --dart-define-from-file dart_defines/prod.json

      - name: Run tests
        run: flutter test
